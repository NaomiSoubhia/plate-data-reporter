stages:
  - validate
  - test

validate:
  stage: validate
  image: python:3.11

  before_script:
    - pip install -r requirements.txt

  script:
    - python -m compileall .

unit-tests:
  stage: test
  image: python:3.11

  before_script:
    - pip install -r requirements.txt

  script:
    - pytest